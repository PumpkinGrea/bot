# 复制本文件为 config.yaml，填入你自己的真实值（config.yaml 不会入库）。
# appid / secret 在 QQ 开放平台后台获取。
appid: "你的appid"
secret: "你的secret"

# 图片服务（镜像/幻影坦克用）。处理后的图托管在本机，需让公网能拉取。
# img_host: 本地监听地址，0.0.0.0 表示所有网卡（服务器部署必须 0.0.0.0）
# img_port: 监听端口。务必在云服务器安全组/防火墙放行此端口
# img_public_base: 图片对外的公网地址 base（末尾不要加斜杠）
#   · 部署在有公网 IP 的服务器：留空即可，程序会自动探测公网 IP 拼成 http://IP:端口
#     （若有域名/Nginx，可手动填 https://你的域名）
#   · 本地开发机：用 cpolar/frp 等内网穿透，把拿到的公网域名填这里
#   · 探测失败且留空：镜像/幻影坦克自动关闭，其它功能不受影响
img_host: "0.0.0.0"
img_port: 9900
img_public_base: ""
